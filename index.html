<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreoHub — Gestão inteligente para festivais de dança</title>
    <meta name="description" content="CoreoHub é a plataforma completa para produtores de festivais de dança: inscrições, pagamentos, jurados, cronograma e resultados em um só lugar.">
    <meta name="theme-color" content="#ff0068">
    <link rel="icon" type="image/png" href="/coreohub-avatar.png">
    <link rel="apple-touch-icon" href="/coreohub-avatar.png">
    <!-- PWA / iOS Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CoreoHub">
    <meta name="mobile-web-app-capable" content="yes">
    <meta property="og:title" content="CoreoHub — Gestão inteligente para festivais de dança">
    <meta property="og:description" content="Plataforma completa para produtores de festivais de dança.">
    <meta property="og:image" content="/coreohub-logo.png">
    <meta property="og:url" content="https://coreohub.com">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-mesh min-h-screen">
    <!-- #14 mudança 3: redirect inline pre-React quando tablet em modo Terminal
         abre na raiz '/'. Evita flash da raiz antes do RootRedirect rodar.
         Roda síncrono ANTES do bundle React baixar — instantaneo no PWA. -->
    <script>
      (function () {
        try {
          var path = window.location.pathname;
          if (path === '/' || path === '/index.html') {
            var isKiosk = localStorage.getItem('coreohub_tablet_kiosk_mode') === 'true';
            var token = localStorage.getItem('coreohub_tablet_judge_token');
            if (isKiosk && token) {
              window.location.replace('/judge-login/' + token);
            }
          }
        } catch (e) { /* localStorage indisponível: deixa o React lidar */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
